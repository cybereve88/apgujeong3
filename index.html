<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>압구정 3구역 조합원 소통 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f7; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #1e40af; }
        .btn-group { display: block; }
        button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #cbd5e1; border-radius: 6px; background-color: white; font-size: 14px; cursor: pointer; text-align: left; }
        button.active { background-color: #2563eb; color: white; border-color: #2563eb; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background-color: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; margin-top: 15px; }
        .result-box { margin-top: 25px; background-color: #eff6ff; padding: 15px; border-radius: 8px; border: 1px solid #bfdbfe; }
        .result-line { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
        .bar-container { background-color: #e2e8f0; height: 12px; border-radius: 6px; width: 60%; overflow: hidden; }
        .bar { background-color: #3b82f6; height: 100%; width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ 압구정 3구역 실시간 여론 반영 시스템</h1>
    
    <div class="section">
        <div class="section-title">① 소유하신 단지 권역을 선택해 주세요</div>
        <div class="btn-group">
            <button type="button" onclick="selectZone(this, '현대1~7,10,13,14차')">현대 1~7, 10, 13, 14차</button>
            <button type="button" onclick="selectZone(this, '현대8,11,12차')">현대 8, 11, 12차</button>
            <button type="button" onclick="selectZone(this, '대림빌라')">대림빌라</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">② 조합 내 직책/위계를 선택해 주세요</div>
        <div class="btn-group">
            <button type="button" onclick="selectRank(this, '조합 임원 및 대의원')">조합 임원 및 대의원</button>
            <button type="button" onclick="selectRank(this, '일반 조합원')">일반 조합원</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">③ 현재 가장 먼저 해결해야 할 핵심 과제는?</div>
        <div class="btn-group">
            <button type="button" onclick="selectIssue(this, '공공기여 비율 및 기부채납 조정')">공공기여 비율 및 기부채납 조정</button>
            <button type="button" onclick="selectIssue(this, '초고층 정비계획 및 일조권 확보')">초고층 정비계획 및 일조권 확보</button>
            <button type="button" onclick="selectIssue(this, '상가 독립정산제 및 분쟁 예방')">상가 독립정산제 및 분쟁 예방</button>
            <button type="button" onclick="selectIssue(this, '공사비 증액 최소화 및 시공사 조건')">공사비 증액 최소화 및 시공사 조건</button>
        </div>
    </div>

    <button class="submit-btn" onclick="submitVote()">📊 실시간 클라우드 자산 지도에 의견 반영</button>

    <div class="result-box">
        <div style="font-weight: bold; margin-bottom: 10px; color: #1e3a8a; text-align: center;">📈 조합원 실시간 투표 집계 상황</div>
        <div id="results-list"></div>
    </div>
</div>

<script>
    // [중요] 대표님의 Supabase 고유 암호 전선 연결 완료
    const SUPABASE_URL = "https://ynkbhbhzvkpcnjgffwjy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua2JoYmh6dmtwY25qZ2Zmd2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDE1ODIsImV4cCI6MjA5NDUxNzU4Mn0.NKhZ7zRZoKn8qUgXQE0z3KXJo2FrPhAgvngkJhniGzM";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedData = { zone: '', rank: '', core_issue: '' };

    function selectZone(btn, val) { resetActive(btn); btn.classList.add('active'); selectedData.zone = val; }
    function selectRank(btn, val) { resetActive(btn); btn.classList.add('active'); selectedData.rank = val; }
    function selectIssue(btn, val) { resetActive(btn); btn.classList.add('active'); selectedData.core_issue = val; }
    function resetActive(btn) { let btns = btn.parentElement.querySelectorAll('button'); btns.forEach(b => b.classList.remove('active')); }

    // 서버로 데이터를 전송하는 핵심 함수
    async function submitVote() {
        if(!selectedData.zone || !selectedData.rank || !selectedData.core_issue) {
            alert("①, ②, ③번 항목을 모두 선택해 주셔야 클라우드 반영이 가능합니다.");
            return;
        }
        
        const { data, error } = await _supabase.from('votes').insert([
            { zone: selectedData.zone, rank: selectedData.rank, core_issue: selectedData.core_issue }
        ]);

        if (error) {
            alert("연동 실패: " + error.message);
        } else {
            alert("🎉 대표님! 압구정 3구역 조합원 자산 지도에 실시간으로 반영되었습니다.");
            loadResults();
        }
    }

    // 서버에서 실시간 통계를 가져와 막대그래프로 그려주는 함수
    async function loadResults() {
        const { data, error } = await _supabase.from('votes').select('core_issue');
        if (error) return;

        let counts = {
            '공공기여 비율 및 기부채납 조정': 0,
            '초고층 정비계획 및 일조권 확보': 0,
            '상가 독립정산제 및 분쟁 예방': 0,
            '공사비 증액 최소화 및 시공사 조건': 0
        };

        data.forEach(row => { if(counts[row.core_issue] !== undefined) counts[row.core_issue]++; });
        let total = data.length || 1;

        let html = '';
        for (let key in counts) {
            let pct = Math.round((counts[key] / total) * 100);
            html += `<div class="result-line">
                <div style="width:35%; font-size:12px; font-weight:bold;">${key}</div>
                <div class="bar-container"><div class="bar" style="width:${pct}%"></div></div>
                <div style="width:10%; text-align:right; font-size:12px; font-weight:bold;">${counts[key]}표 (${pct}%)</div>
            </div>`;
        }
        document.getElementById('results-list').innerHTML = html;
    }
    
    // 페이지 켜지자마자 기존 투표 상황 불러오기
    window.onload = loadResults;
</script>
</body>
</html>
